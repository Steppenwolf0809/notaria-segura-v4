<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario UAFE - Notaría 18 Quito</title>
  <meta http-equiv="refresh" content="0;url=https://notaria-segura-v4-production.up.railway.app/formulario-uafe">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      border: 4px solid #e0e0e0;
      border-top: 4px solid #1976d2;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    a {
      color: #1976d2;
      text-decoration: none;
      font-weight: 500;
    }
    a:hover { text-decoration: underline; }
  </style>
  <script>
    window.location.href = 'https://notaria-segura-v4-production.up.railway.app/formulario-uafe';
  </script>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p>Redirigiendo al formulario...</p>
    <p><a href="https://notaria-segura-v4-production.up.railway.app/formulario-uafe">
      Si no es redirigido automaticamente, haga clic aqui
    </a></p>
  </div>
</body>
</html>
